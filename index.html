<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header class="top-bar">
      <h1>Sudoku Solver</h1>
      <button id="themeBtn" class="theme-btn" type="button">Dark Mode</button>
    </header>

    <p class="subtitle">Enter a puzzle or load a sample, then solve it.</p>

    <!-- The 9x9 grid is created by JavaScript -->
    <div id="grid" class="grid"></div>

    <div class="buttons">
      <button id="solveBtn" type="button">Solve</button>
      <button id="visualBtn" type="button">Visual Solve</button>
      <button id="sampleBtn" type="button">Sample</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>

    <p id="message" class="message"></p>

    <div class="stats">
      <span>Time: <strong id="time">0</strong> ms</span>
      <span>Filled: <strong id="filled">0</strong> / 81</span>
    </div>

    <footer class="footer">
      <p>Made with HTML, CSS and JavaScript - SkillCraft Task 3</p>
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
